<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Günstigster Döner – Franken</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f6f3ef; --card: #fff; --border: #ede9e3;
    --text: #1c1a18; --muted: #9a9590; --accent: #c8773a;
    --shadow: 0 1px 4px rgba(0,0,0,.07);
    --shadow-hover: 0 6px 20px rgba(0,0,0,.12);
    --badge-bg: #fdf0e6; --badge-border: #f5d9bc;
    --rb-2-bg: #e0e0e0; --rb-2-col: #444;
    --foot: #d8d4ce;
  }

  [data-theme="dark"] {
    --bg: #111009; --card: #1c1a16; --border: #2c2922;
    --text: #ede9e2; --muted: #7a7368; --accent: #e08840;
    --shadow: 0 1px 6px rgba(0,0,0,.35);
    --shadow-hover: 0 6px 22px rgba(0,0,0,.5);
    --badge-bg: #2a1e12; --badge-border: #4a3020;
    --rb-2-bg: #3a3830; --rb-2-col: #ccc;
    --foot: #3a3630;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; flex-direction: column;
    transition: background .25s, color .25s;
  }

  /* ── HEADER ── */
  header {
    background: var(--card); border-bottom: 1px solid var(--border);
    padding: 28px 24px 24px; transition: background .25s, border-color .25s;
  }

  .header-inner { max-width: 680px; margin: 0 auto; }

  .header-top { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }

  h1 { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.03em; flex: 1; }

  .lang-switcher {
    display: flex; border: 1px solid var(--border);
    border-radius: 20px; overflow: hidden; flex-shrink: 0;
    transition: border-color .25s;
  }

  .lang-btn {
    padding: 4px 9px; background: none; border: none; cursor: pointer;
    font-size: 0.68rem; font-weight: 700; color: var(--muted);
    letter-spacing: 0.03em; transition: background .15s, color .15s;
  }

  .lang-btn + .lang-btn { border-left: 1px solid var(--border); }
  .lang-btn.active { background: var(--accent); color: #fff; }
  .lang-btn:hover:not(.active) { color: var(--text); }

  #theme-toggle {
    width: 32px; height: 32px; border-radius: 50%;
    border: 1px solid var(--border); background: var(--card);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; color: var(--muted);
    transition: background .2s, border-color .2s, transform .15s;
  }

  #theme-toggle:hover { background: var(--bg); transform: rotate(20deg); color: var(--accent); }

  .subtitle { font-size: 0.85rem; color: var(--muted); transition: color .25s; }

  /* ── GRID ── */
  main { flex: 1; }

  .grid-inner { max-width: 680px; margin: 0 auto; padding: 24px; }

  .city-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }

  @media (max-width: 480px) { .city-grid { grid-template-columns: 1fr; } }

  .city-card {
    background: var(--card); border-radius: 16px; padding: 20px;
    box-shadow: var(--shadow);
    display: flex; flex-direction: column; gap: 4px;
    text-decoration: none; color: var(--text);
    transition: box-shadow .2s, transform .15s, background .25s;
    border: 1px solid transparent;
  }

  .city-card:hover {
    box-shadow: var(--shadow-hover); transform: translateY(-2px);
    border-color: var(--accent);
  }

  .city-name {
    font-size: 1.2rem; font-weight: 800; letter-spacing: -0.02em;
  }

  .city-region {
    font-size: 0.73rem; color: var(--muted); margin-bottom: 10px;
    transition: color .25s;
  }

  .city-avg {
    font-size: 1.5rem; font-weight: 800; color: var(--accent);
    letter-spacing: -0.03em; line-height: 1;
  }

  .city-avg-label {
    font-size: 0.7rem; color: var(--muted); margin-bottom: 12px;
    transition: color .25s;
  }

  .city-cta {
    font-size: 0.8rem; font-weight: 600; color: var(--accent);
    display: flex; align-items: center; gap: 4px; margin-top: auto;
  }

  /* ── FOOTER ── */
  .geiz-footer {
    text-align: center; padding: 20px 20px 16px;
    font-size: 0.6rem; font-style: italic;
    letter-spacing: 0.1em; color: var(--foot);
    transition: color .25s;
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-top">
      <h1>🥙 Günstigster Döner</h1>
      <div class="lang-switcher">
        <button class="lang-btn" data-lang="de" onclick="setLang('de')">DE</button>
        <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
        <button class="lang-btn" data-lang="tr" onclick="setLang('tr')">TR</button>
      </div>
      <button id="theme-toggle" onclick="toggleTheme()">
        <svg id="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg id="icon-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
        </svg>
      </button>
    </div>
    <p class="subtitle" data-i18n="subtitle"></p>
  </div>
</header>

<main>
  <div class="grid-inner">
    <div class="city-grid" id="city-grid"></div>
  </div>
</main>

<footer class="geiz-footer">Geiz ist geil.</footer>

<script>
const CITIES = [
  { name: 'Bamberg',  region: 'Oberfranken',  url: './bamberg/',  avg: 7.28, places: 10 },
  { name: 'Nürnberg', region: 'Mittelfranken', url: './nurnberg/', avg: 7.56, places: 10 },
  { name: 'Würzburg', region: 'Unterfranken',  url: './wurzburg/', avg: 7.51, places: 10 },
  { name: 'Erlangen', region: 'Mittelfranken', url: './erlangen/', avg: 7.51, places: 10 },
];

const STRINGS = {
  de: { subtitle: 'Den günstigsten Döner in Franken finden.', avg: 'Ø Preis', places: 'Läden', cta: 'Zur Liste →' },
  en: { subtitle: 'Find the cheapest döner in Franconia.',    avg: 'Avg price', places: 'places', cta: 'View list →' },
  tr: { subtitle: 'Frankonya\'da en ucuz dönerciyi bul.',      avg: 'Ort. fiyat', places: 'yer', cta: 'Listeye git →' },
};

let darkMode = false;
let currentLang = 'de';

function applyTheme(dark) {
  darkMode = dark;
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  document.getElementById('icon-sun').style.display  = dark ? 'block' : 'none';
  document.getElementById('icon-moon').style.display = dark ? 'none'  : 'block';
}

function toggleTheme() {
  const next = !darkMode;
  localStorage.setItem('theme', next ? 'dark' : 'light');
  applyTheme(next);
}

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('lang', lang);
  document.documentElement.lang = lang;
  document.querySelectorAll('.lang-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.lang === lang)
  );
  document.querySelectorAll('[data-i18n]').forEach(el =>
    el.textContent = STRINGS[lang][el.dataset.i18n] ?? ''
  );
  renderCities(lang);
}

function renderCities(lang) {
  const s = STRINGS[lang];
  const grid = document.getElementById('city-grid');
  grid.innerHTML = '';
  CITIES.forEach(c => {
    grid.insertAdjacentHTML('beforeend', `
      <a href="${c.url}" class="city-card">
        <div class="city-name">${c.name}</div>
        <div class="city-region">${c.region} · Bayern</div>
        <div class="city-avg">${c.avg.toFixed(2).replace('.', ',')} €</div>
        <div class="city-avg-label">${s.avg} · ${c.places} ${s.places}</div>
        <div class="city-cta">${s.cta}</div>
      </a>
    `);
  });
}

(function () {
  const savedTheme = localStorage.getItem('theme');
  applyTheme(savedTheme ? savedTheme === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches);
  const savedLang = localStorage.getItem('lang');
  const bl = navigator.language.slice(0, 2);
  setLang(savedLang || (['de','en','tr'].includes(bl) ? bl : 'de'));
})();
</script>
</body>
</html>
